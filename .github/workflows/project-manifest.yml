name: Project Manifest

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main
    paths:
      - "Build/Export-ProjectManifest.ps1"
      - "CodeGlyphX/**/*.csproj"
      - "WebsiteArtifacts/project-manifest.json"
  push:
    branches:
      - master
      - main
    paths:
      - "Build/Export-ProjectManifest.ps1"
      - "CodeGlyphX/**/*.csproj"
      - "WebsiteArtifacts/project-manifest.json"

jobs:
  verify-manifest:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate Manifest
        shell: pwsh
        run: |
          ./Build/Export-ProjectManifest.ps1

      - name: Verify Manifest Is Committed
        shell: pwsh
        run: |
          git diff --exit-code -- WebsiteArtifacts/project-manifest.json

      - name: Upload Manifest Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: project-manifest
          path: WebsiteArtifacts/project-manifest.json
