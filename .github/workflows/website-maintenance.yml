name: Website Maintenance

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: read

concurrency:
  group: website-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  website-maintenance:
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-maintenance.yml@1f634b17e21f935ab6b8c052322497d814ce6c8c
    with:
      website_root: Website
      pipeline_config: Website/pipeline.maintenance.json
      engine_mode: source
      runner_labels_json: ${{ github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 1f634b17e21f935ab6b8c052322497d814ce6c8c
      report_artifact_name: powerforge-website-maintenance-reports
