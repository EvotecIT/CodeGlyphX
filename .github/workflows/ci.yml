name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && matrix.selfHostedRunner || format('["{0}"]', matrix.os)) }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            selfHostedRunner: '["self-hosted","linux"]'
          - os: macos-latest
            selfHostedRunner: '["self-hosted","macOS"]'
          - os: windows-latest
            selfHostedRunner: '["self-hosted","windows"]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Build complete solution
        if: runner.os == 'Windows'
        run: dotnet build CodeGlyphX.sln -c Release --nologo

      - name: Build portable projects
        if: runner.os != 'Windows'
        run: |
          dotnet build CodeGlyphX/CodeGlyphX.csproj -c Release -f netstandard2.0 --nologo
          dotnet build CodeGlyphX/CodeGlyphX.csproj -c Release -f net8.0 --nologo
          dotnet build CodeGlyphX/CodeGlyphX.csproj -c Release -f net10.0 --nologo
          dotnet build CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net8.0 --nologo
          dotnet build CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net10.0 --nologo
          dotnet build CodeGlyphX.Examples/CodeGlyphX.Examples.csproj -c Release --nologo
          dotnet build CodeGlyphX.Fuzz/CodeGlyphX.Fuzz.csproj -c Release --nologo

      - name: Download hash-pinned test corpora
        shell: pwsh
        run: |
          ./Build/Download-ImageSamples.ps1 -NoUpdateManifest
          ./Build/Download-ExternalSamples.ps1 -NoUpdateManifest

      - name: Test (net8.0)
        run: dotnet test CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net8.0 --no-restore --no-build

      - name: Test (net10.0)
        run: dotnet test CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net10.0 --no-restore --no-build

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./CodeGlyphX.Tests/TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true

      - name: Test (net472 smoke)
        if: runner.os == 'Windows'
        run: dotnet test CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net472 --no-restore --no-build

  release-contracts:
    name: Package & NativeAOT contracts
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Pack release artifacts
        run: dotnet pack CodeGlyphX/CodeGlyphX.csproj -c Release -o artifacts/packages --nologo

      - name: Validate package contents
        shell: pwsh
        run: ./Build/Assert-Package.ps1 -PackageDirectory artifacts/packages

      - name: Publish NativeAOT consumer
        run: dotnet publish CodeGlyphX.Examples/CodeGlyphX.Examples.csproj -c Release -f net8.0 -r linux-x64 -p:PublishAot=true --self-contained true -o artifacts/aot-smoke --nologo

      - name: Run NativeAOT public API smoke test
        env:
          CODEGLYPHX_CI_SMOKE: "1"
          CODEGLYPHX_OUTPUT_DIR: ${{ github.workspace }}/artifacts/aot-output
        run: ./artifacts/aot-smoke/CodeGlyphX.Examples

  website-build:
    name: Website Build (PR)
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      packages: read
    uses: EvotecIT/PSPublishModule/.github/workflows/powerforge-website-ci.yml@161a22a7a91b6f05b7bf9268287ff69f44ea204a
    with:
      website_root: Website
      pipeline_config: Website/pipeline.website-ci.json
      engine_mode: source
      runner_labels_json: ${{ github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]' }}
      powerforge_repository: EvotecIT/PSPublishModule
      powerforge_ref: 161a22a7a91b6f05b7bf9268287ff69f44ea204a
      report_artifact_name: powerforge-website-reports

  coverage:
    name: Coverage (linux)
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore Tests
        run: dotnet restore CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -p:TargetFramework=net8.0

      - name: Build Tests (net8.0)
        run: dotnet build CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net8.0 --no-restore

      - name: Download hash-pinned test corpora
        shell: pwsh
        run: |
          ./Build/Download-ImageSamples.ps1 -NoUpdateManifest
          ./Build/Download-ExternalSamples.ps1 -NoUpdateManifest

      - name: Test (net8.0 + coverage, excluding timing-sensitive corpus)
        run: dotnet test CodeGlyphX.Tests/CodeGlyphX.Tests.csproj -c Release -f net8.0 --no-restore --no-build --filter "Category!=CorpusTiming" --collect:"XPlat Code Coverage" --settings Build/coverage.runsettings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./CodeGlyphX.Tests/TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true
