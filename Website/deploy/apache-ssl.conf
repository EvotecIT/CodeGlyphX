<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName codeglyphx.com
    ServerAlias www.codeglyphx.com
    DocumentRoot /var/www/codeglyphx/com/current

    RewriteEngine On
    RewriteCond %{HTTP_HOST} !^codeglyphx\.com$ [NC]
    RewriteRule ^ https://codeglyphx.com%{REQUEST_URI} [END,NE,R=permanent]

    <Directory /var/www/codeglyphx/com/current>
        Options -Indexes +FollowSymLinks
        AllowOverride FileInfo
        Require all granted
    </Directory>

    DirectoryIndex index.html
    ErrorDocument 404 /404.html

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set Content-Signal "search=yes, ai-input=yes, ai-train=no"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    Header set Cache-Control "public, max-age=300, s-maxage=3600, stale-while-revalidate=86400, stale-if-error=604800"
    <LocationMatch "^/(?:assets|css|fonts|js|playground/_framework)/">
        Header set Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800"
    </LocationMatch>
    <Location "/_powerforge/deployment.json">
        Header set Cache-Control "no-store"
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/codeglyphx-com-error.log
    CustomLog ${APACHE_LOG_DIR}/codeglyphx-com-access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/codeglyphx.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/codeglyphx.com/privkey.pem
</VirtualHost>
</IfModule>
